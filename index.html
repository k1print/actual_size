<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名刺実寸表示（横向き画像を縦で表示）</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; touch-action: manipulation; background: #fff; }
        #setup { background: #f9f9f9; padding: 20px; border-radius: 15px; border: 1px solid #ddd; }
        .guide-circle { 
            width: 100px; height: 100px; background: #ffd700; border-radius: 50%; 
            margin: 20px auto; display: flex; align-items: center; justify-content: center; 
            font-size: 14px; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #result-container { display: none; margin-top: 50px; text-align: center; }
        
        /* 画像を表示する枠の設定 */
        #display-image { 
            border: 1px solid #000; 
            display: block; 
            margin: 0 auto;
            object-fit: fill;
            /* 横向き画像を90度回転させる設定 */
            transform: rotate(90deg);
        }
        
        input[type="range"] { width: 90%; margin: 20px 0; }
        button { padding: 15px 30px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; }
        .file-input { margin-bottom: 20px; }
        .back-btn { background: #666; margin-top: 80px; } /* 回転表示用に余白を多めに */
    </style>
</head>
<body>

    <div id="setup">
        <h2>1. 画像を選んでサイズ調整</h2>
        <div class="file-input">
            <input type="file" id="image-selector" accept="image/*">
        </div>

        <p>手元の「1円玉」を画面に当てて、<br>下の円と同じ大きさになるよう調整してください。</p>
        <div id="coin" class="guide-circle">1円玉</div>
        <input type="range" id="scale-slider" min="50" max="350" value="100">
        
        <div>
            <button onclick="showActualSize()">2. 実寸で表示する</button>
        </div>
    </div>

    <div id="result-container">
        <!-- ここに画像が表示されます -->
        <img id="display-image" src="" alt="実寸表示画像">
        
        <button class="back-btn" onclick="location.reload()">最初に戻る</button>
        <p style="color: #666; font-size: 12px; margin-top: 20px;">※スマホを縦にしたまま確認してください</p>
    </div>

   <script>
       
</body>
</html>
